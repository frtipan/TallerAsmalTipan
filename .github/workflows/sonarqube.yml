name: Quality Gates + DAST Analysis

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

env:
  SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL || 'http://localhost:9000' }}
  SONAR_LOGIN: ${{ secrets.SONAR_LOGIN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

jobs:
  quality-dast-analysis:
    runs-on: ubuntu-latest
    name: Quality Gates + DAST Analysis

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify Docker availability
        run: |
          docker --version
          docker compose version

      - name: Start application stack
        run: |
          docker compose up -d --build

      - name: Wait for frontend readiness
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:3000 >/dev/null 2>&1; then
              echo "Frontend is up"
              exit 0
            fi
            echo "Waiting for frontend on port 3000..."
            sleep 10
          done
          echo "Frontend did not become ready in time"
          docker compose ps
          docker compose logs --tail=200
          exit 1

      - name: Run SonarQube Analysis
        if: ${{ env.SONAR_LOGIN != '' }}
        id: sonar
        continue-on-error: true
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ env.SONAR_LOGIN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=app-reservas
            -Dsonar.projectName=App Reservas
            -Dsonar.qualitygate.wait=true
            -Dsonar.exclusions=**/node_modules/**,**/*.test.js,**/dist/**

      - name: Skip SonarQube when no token
        if: ${{ env.SONAR_LOGIN == '' }}
        run: echo "Skipping SonarQube analysis because SONAR_LOGIN secret is not configured."

      - name: Run DAST smoke scan with OWASP ZAP
        id: dast
        continue-on-error: true
        run: |
          mkdir -p reports
          set +e
          docker run --rm --network host \
            -v "$GITHUB_WORKSPACE/reports:/zap/wrk:rw" \
            owasp/zap2docker-stable \
            zap-baseline.py -t http://127.0.0.1:3000 -J /zap/wrk/zap-report.json -r /zap/wrk/zap-report.html -I
          exit_code=$?
          set -e
          echo "dast_exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          if [ -f reports/zap-report.json ]; then
            echo "dast_alert_count=1" >> "$GITHUB_OUTPUT"
            echo "dast_risk_summary=DAST report generated; inspect the workflow artifacts" >> "$GITHUB_OUTPUT"
            echo "dast_vulnerabilities=- Review the ZAP report in the workflow artifacts" >> "$GITHUB_OUTPUT"
          else
            echo "No DAST report generated"
            echo "dast_alert_count=0" >> "$GITHUB_OUTPUT"
            echo "dast_risk_summary=No report generated" >> "$GITHUB_OUTPUT"
            echo "dast_vulnerabilities=- No report generated" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload DAST report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dast-reports
          path: reports/
          if-no-files-found: ignore

      - name: Cleanup Docker Compose
        if: always()
        run: docker compose down -v --remove-orphans

      - name: Notify Telegram - Kevin (SonarQube)
        if: ${{ always() }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram secrets are missing; skipping notification"
            exit 0
          fi

          MESSAGE=$(cat <<EOF
          Reporte 1 — Kevin (SonarQube)

          Responsable: ${{ github.actor }}
          Evento: ${{ github.event_name }}
          Rama: ${{ github.ref_name }}
          Repositorio: ${{ github.repository }}
          Commit: ${{ github.sha }}

          Resultado SonarQube: ${{ steps.sonar.outcome || 'skipped' }}
          Estado general: ${{ job.status }}
          EOF
          )

          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MESSAGE}" \
            --data-urlencode "parse_mode=HTML" \
            -o /tmp/telegram-kevin.json
          cat /tmp/telegram-kevin.json

      - name: Notify Telegram - Fernando (DAST vulnerabilities)
        if: ${{ always() }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram secrets are missing; skipping notification"
            exit 0
          fi

          MESSAGE=$(cat <<EOF
          Reporte 2 — Fernando (DAST)

          Responsable: ${{ github.actor }}
          Evento: ${{ github.event_name }}
          Rama: ${{ github.ref_name }}
          Repositorio: ${{ github.repository }}
          Commit: ${{ github.sha }}

          Hallazgos DAST: ${{ steps.dast.outputs.dast_alert_count || '0' }}
          Resumen: ${{ steps.dast.outputs.dast_risk_summary || 'No report generated' }}
          Exit code: ${{ steps.dast.outputs.dast_exit_code || 'No disponible' }}

          Vulnerabilidades detectadas:
          ${{ steps.dast.outputs.dast_vulnerabilities || '- No report generated' }}
          EOF
          )

          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MESSAGE}" \
            --data-urlencode "parse_mode=HTML" \
            -o /tmp/telegram-fernando.json
          cat /tmp/telegram-fernando.json
