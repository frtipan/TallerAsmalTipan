name: Quality Gates + DAST Analysis

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

env:
  SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL || 'http://localhost:9000' }}
  SONAR_LOGIN: ${{ secrets.SONAR_LOGIN }}

jobs:
  quality-dast-analysis:
    runs-on: ubuntu-latest
    name: Quality Gates + DAST Analysis

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm ci --prefix auth-service
          npm ci --prefix booking-service
          npm ci --prefix frontend
          npm ci --prefix notification-service
          npm ci --prefix user-service

      - name: Start services with Docker Compose
        run: |
          docker compose up -d --build
          echo "Waiting for the frontend to be ready..."
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:3000 > /dev/null 2>&1; then
              echo "Frontend is up at http://127.0.0.1:3000"
              break
            fi
            echo "Attempt $i/30: frontend not ready yet"
            sleep 10
          done
          curl -I http://127.0.0.1:3000 || true

      - name: Run DAST scan with OWASP ZAP
        id: dast
        continue-on-error: true
        run: |
          mkdir -p reports
          set +e
          docker run --rm --network host \
            -v "$GITHUB_WORKSPACE/reports:/zap/wrk:rw" \
            owasp/zap2docker-stable \
            zap-baseline.py -t http://127.0.0.1:3000 -J /zap/wrk/zap-report.json -r /zap/wrk/zap-report.html -I
          exit_code=$?
          set -e
          echo "dast_exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          if [ -f reports/zap-report.json ]; then
            python - <<'PY'
            import json
            from pathlib import Path

            report_path = Path("reports/zap-report.json")
            if report_path.exists():
                data = json.loads(report_path.read_text(encoding="utf-8"))
                alerts = []
                for site in data.get("site", []):
                    alerts.extend(site.get("alerts", []))
                print(f"DAST alerts detected: {len(alerts)}")
                if alerts:
                    by_risk = {}
                    for alert in alerts:
                        risk = alert.get("risk", "Informational")
                        by_risk[risk] = by_risk.get(risk, 0) + 1
                    for risk in sorted(by_risk):
                        print(f"- {risk}: {by_risk[risk]}")
            else:
                print("No DAST report generated")
            PY
          fi

      - name: Upload DAST report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dast-reports
          path: reports/
          if-no-files-found: ignore

      - name: Run SonarQube Analysis
        if: ${{ env.SONAR_LOGIN != '' }}
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_LOGIN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=app-reservas
            -Dsonar.projectName=App Reservas
            -Dsonar.qualitygate.wait=true
            -Dsonar.exclusions=**/node_modules/**,**/*.test.js,**/dist/**

      - name: Skip SonarQube when no token
        if: ${{ env.SONAR_LOGIN == '' }}
        run: echo "Skipping SonarQube analysis because SONAR_LOGIN secret is not configured."

      - name: Cleanup Docker Compose
        if: always()
        run: docker compose down -v --remove-orphans

      - name: Notify Telegram on Success
        if: ${{ success() && secrets.TELEGRAM_CHAT_ID != '' && secrets.TELEGRAM_BOT_TOKEN != '' }}
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ✅ QUALITY GATES + DAST FINALIZADO CORRECTAMENTE

            Responsable: ${{ github.actor }}
            Evento: ${{ github.event_name }}
            Rama: ${{ github.ref_name }}
            Repositorio: ${{ github.repository }}
            Commit: ${{ github.sha }}

            🔎 RESULTADOS DE ANÁLISIS
            • SonarQube: ejecutado correctamente
            • DAST: escaneo dinámico completado
            • Estado DAST: ${{ steps.dast.outputs.dast_exit_code == '0' && 'Sin alertas críticas' || 'Revisar reporte' }}

            📌 DETALLES
            - La revisión fue iniciada por: ${{ github.actor }}
            - El pipeline corrió sobre: ${{ github.ref_name }}
            - Puedes revisar los artefactos en la sección de Actions del repositorio

      - name: Notify Telegram on Failure
        if: ${{ failure() && secrets.TELEGRAM_CHAT_ID != '' && secrets.TELEGRAM_BOT_TOKEN != '' }}
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ❌ QUALITY GATES + DAST CON PROBLEMAS

            Responsable: ${{ github.actor }}
            Evento: ${{ github.event_name }}
            Rama: ${{ github.ref_name }}
            Repositorio: ${{ github.repository }}
            Commit: ${{ github.sha }}

            🔎 RESULTADOS DE ANÁLISIS
            • SonarQube: revisar resultado del análisis
            • DAST: revisar artefacto y logs del workflow
            • Exit code DAST: ${{ steps.dast.outputs.dast_exit_code || 'No disponible' }}

            ⚠️ ACCIONES REQUERIDAS
            - Revisar el reporte DAST en los artefactos del workflow
            - Corregir vulnerabilidades detectadas
            - Verificar que los servicios estén respondiendo en la pila Docker
