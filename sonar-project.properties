# SonarQube Project Configuration
sonar.projectKey=app-reservas
sonar.projectName=App Reservas - Booking System
sonar.projectVersion=1.0.0
sonar.sourceEncoding=UTF-8

# Paths and exclusions
sonar.sources=.
sonar.exclusions=**/node_modules/**,**/*.test.js,**/*.spec.js,**/dist/**,**/build/**,.git/**,.github/**
sonar.coverage.exclusions=**/node_modules/**,**/*.test.js,**/*.spec.js,**/dist/**,**/build/**

# JavaScript/TypeScript specific
sonar.javascript.lcov.reportPaths=**/coverage/lcov.info
sonar.typescript.lcov.reportPaths=**/coverage/lcov.info

# Quality Gate
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300

# Additional settings
sonar.login=${SONAR_LOGIN}
sonar.password=
